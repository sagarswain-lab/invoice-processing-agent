name: invoice-processing-agent
version: "0.1.0"
description: >
  An OpenEnv environment where an AI agent processes invoices and decides
  to approve, reject, or flag them for human review.
  Tasks range from simple threshold-based decisions to complex anomaly detection.
author: Sagar Swain
tags:
  - openenv
  - real-world
  - finance
  - agentic

entrypoint: uvicorn server.app:app --host 0.0.0.0 --port 7860

tasks:
  - name: easy_triage
    description: Approve or reject invoices with clear signals
    difficulty: easy

  - name: medium_triage
    description: Handle duplicates, over-budget, and multi-vendor invoices
    difficulty: medium

  - name: hard_triage
    description: Detect subtle anomalies — missing fields, currency mismatches, line item errors
    difficulty: hard

action_space:
  type: discrete
  fields:
    - name: decision
      type: string
      values: [approve, reject, flag]
    - name: reason
      type: string

observation_space:
  fields:
    - invoice_id
    - vendor
    - amount
    - currency
    - date
    - line_items
    - flags
    - task_name
    - step
    - total_steps
    - done
    - reward
    - message

reward_range: [-0.5, 1.0]